<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ライフログ - raspi-voice</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100%;
            color: #333;
        }

        /* Header */
        .header {
            background: #4ade80;
            color: white;
            padding: 15px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            flex: 1;
        }

        .header .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 5px;
        }

        .header .view-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .header .view-toggle:active {
            background: rgba(255,255,255,0.3);
        }

        /* Main container */
        .container {
            padding-top: 70px;
            padding-bottom: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Calendar View */
        .calendar-view {
            padding: 15px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header .month-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .calendar-header button {
            background: #4ade80;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .calendar-header button:active {
            background: #22c55e;
        }

        .calendar-grid {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
        }

        .calendar-weekdays span {
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            color: #666;
            font-weight: 500;
        }

        .calendar-weekdays span:first-child {
            color: #ef4444;
        }

        .calendar-weekdays span:last-child {
            color: #3b82f6;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .calendar-day:hover {
            background: #f5f5f5;
        }

        .calendar-day.other-month {
            color: #ccc;
        }

        .calendar-day.today {
            background: #e8f5e9;
        }

        .calendar-day.selected {
            background: #4ade80;
            color: white;
        }

        .calendar-day.has-photos::after {
            content: '';
            position: absolute;
            bottom: 6px;
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
        }

        .calendar-day.selected.has-photos::after {
            background: white;
        }

        .calendar-day .day-number {
            font-size: 0.95rem;
        }

        /* Folder View */
        .folder-view {
            padding: 15px;
            display: none;
        }

        .folder-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .folder-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .folder-item:active {
            transform: scale(0.98);
        }

        .folder-item .folder-icon {
            font-size: 2rem;
        }

        .folder-item .folder-info {
            flex: 1;
        }

        .folder-item .folder-date {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .folder-item .folder-count {
            font-size: 0.85rem;
            color: #666;
        }

        .folder-item .folder-preview {
            display: flex;
            gap: 4px;
        }

        .folder-item .folder-preview img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }

        /* Photo Grid */
        .photo-section {
            padding: 15px;
            margin-top: 15px;
        }

        .photo-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .photo-section-header h2 {
            font-size: 1.1rem;
            color: #333;
        }

        .photo-section-header .photo-count {
            font-size: 0.85rem;
            color: #666;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .photo-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #e0e0e0;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .photo-item:active img {
            transform: scale(1.05);
        }

        .photo-item .photo-time {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            font-size: 0.7rem;
            padding: 15px 6px 6px;
            text-align: center;
        }

        /* Photo Modal */
        .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .photo-modal.active {
            display: flex;
        }

        .photo-modal .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
        }

        .photo-modal .modal-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
            max-height: 100%;
            padding: 20px;
        }

        .photo-modal .photo-info {
            font-size: 0.9rem;
            color: white;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .photo-modal .modal-body {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-modal .modal-body img {
            max-width: 90vw;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .photo-modal .modal-footer {
            margin-top: 15px;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .photo-modal .modal-footer .modal-footer-content {
            text-align: center;
        }

        .photo-modal .modal-footer .analysis {
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.9;
        }

        .photo-modal .modal-footer .location-info {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .photo-modal .modal-footer .location-info:empty {
            display: none;
        }

        .photo-modal .modal-footer .location-info a {
            color: #4ade80;
            text-decoration: none;
        }

        .photo-modal .modal-footer .location-info a:hover {
            text-decoration: underline;
        }

        .photo-modal .modal-footer .share-x-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.2s;
        }

        .photo-modal .modal-footer .share-x-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .photo-modal .modal-footer .share-x-btn:active {
            transform: scale(0.95);
        }

        .photo-modal .modal-footer .share-x-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .photo-modal .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
        }

        .photo-modal .nav-btn:active {
            background: rgba(255,255,255,0.3);
        }

        .photo-modal .nav-btn.prev {
            left: 15px;
        }

        .photo-modal .nav-btn.next {
            right: 15px;
        }

        /* Loading & Empty */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(74, 222, 128, 0.2);
            border-top-color: #4ade80;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        /* Display Mode Toggle */
        .display-toggle {
            display: flex;
            gap: 8px;
        }

        .display-toggle button {
            background: #e0e0e0;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .display-toggle button.active {
            background: #4ade80;
            color: white;
        }

        .display-toggle button:active {
            opacity: 0.8;
        }

        /* Diary View */
        .diary-view {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .diary-header {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .diary-header .diary-date {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .diary-header .diary-subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .diary-content {
            padding: 20px;
        }

        .diary-entry {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .diary-entry:last-child {
            border-bottom: none;
        }

        .diary-entry:hover {
            background: #f9f9f9;
            margin: 0 -20px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .diary-entry .entry-time {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4ade80;
            min-width: 60px;
            flex-shrink: 0;
        }

        .diary-entry .entry-content {
            flex: 1;
        }

        .diary-entry .entry-text {
            font-size: 1rem;
            color: #333;
            line-height: 1.5;
        }

        .diary-entry .entry-text.no-analysis {
            color: #999;
            font-style: italic;
        }

        .diary-entry .entry-thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .diary-entry .entry-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .diary-entry .entry-thumbnails {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            align-items: center;
        }

        .diary-entry .entry-thumbnails img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }

        .diary-entry .entry-thumbnails .more-photos {
            font-size: 0.75rem;
            color: #666;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .diary-entry .entry-count {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }

        .diary-empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="back-link">&larr;</a>
        <h1>ライフログ</h1>
        <button class="view-toggle" id="viewToggle">フォルダ</button>
    </div>

    <div class="container">
        <!-- Calendar View -->
        <div class="calendar-view" id="calendarView">
            <div class="calendar-header">
                <button id="prevMonth">&lt;</button>
                <span class="month-title" id="monthTitle">2024年1月</span>
                <button id="nextMonth">&gt;</button>
            </div>
            <div class="calendar-grid">
                <div class="calendar-weekdays">
                    <span>日</span>
                    <span>月</span>
                    <span>火</span>
                    <span>水</span>
                    <span>木</span>
                    <span>金</span>
                    <span>土</span>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>
        </div>

        <!-- Folder View -->
        <div class="folder-view" id="folderView">
            <div class="folder-list" id="folderList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>読み込み中...</p>
                </div>
            </div>
        </div>

        <!-- Photo Section -->
        <div class="photo-section" id="photoSection" style="display: none;">
            <div class="photo-section-header">
                <h2 id="photoDateTitle">2024年1月1日</h2>
                <div class="display-toggle">
                    <button id="gridModeBtn">写真</button>
                    <button id="diaryModeBtn" class="active">日記</button>
                </div>
            </div>
            <div class="photo-grid" id="photoGrid"></div>
            <div class="diary-view" id="diaryView" style="display: none;"></div>
        </div>
    </div>

    <!-- Photo Modal -->
    <div class="photo-modal" id="photoModal">
        <button class="modal-close-btn" id="closeModal">&times;</button>
        <div class="modal-content-wrapper">
            <span class="photo-info" id="modalPhotoInfo"></span>
            <div class="modal-body">
                <button class="nav-btn prev" id="prevPhoto">&lt;</button>
                <img id="modalImg" src="" alt="Photo">
                <button class="nav-btn next" id="nextPhoto">&gt;</button>
            </div>
            <div class="modal-footer">
                <div class="modal-footer-content">
                    <p class="analysis" id="modalAnalysis"></p>
                    <p class="location-info" id="modalLocation"></p>
                </div>
                <button class="share-x-btn" id="shareXBtn" title="Xに共有">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import firebaseConfig from './firebase-config.js';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State
        let currentView = 'calendar'; // 'calendar' or 'folder'
        let currentDisplayMode = 'diary'; // 'grid' or 'diary'
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = null;
        let allLifelogs = {}; // { 'YYYY-MM-DD': { 'HHMMSS': {...} } }
        let currentPhotos = [];
        let currentPhotoIndex = 0;

        // DOM Elements
        const viewToggle = document.getElementById('viewToggle');
        const calendarView = document.getElementById('calendarView');
        const folderView = document.getElementById('folderView');
        const photoSection = document.getElementById('photoSection');
        const calendarDays = document.getElementById('calendarDays');
        const monthTitle = document.getElementById('monthTitle');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');
        const folderList = document.getElementById('folderList');
        const photoGrid = document.getElementById('photoGrid');
        const diaryView = document.getElementById('diaryView');
        const photoDateTitle = document.getElementById('photoDateTitle');
        const gridModeBtn = document.getElementById('gridModeBtn');
        const diaryModeBtn = document.getElementById('diaryModeBtn');
        const photoModal = document.getElementById('photoModal');
        const modalImg = document.getElementById('modalImg');
        const modalPhotoInfo = document.getElementById('modalPhotoInfo');
        const modalAnalysis = document.getElementById('modalAnalysis');
        const closeModal = document.getElementById('closeModal');
        const prevPhoto = document.getElementById('prevPhoto');
        const nextPhoto = document.getElementById('nextPhoto');
        const shareXBtn = document.getElementById('shareXBtn');
        const modalLocation = document.getElementById('modalLocation');

        // Display Mode Toggle (Grid / Diary)
        gridModeBtn.addEventListener('click', () => {
            if (currentDisplayMode === 'grid') return;
            currentDisplayMode = 'grid';
            gridModeBtn.classList.add('active');
            diaryModeBtn.classList.remove('active');
            photoGrid.style.display = 'grid';
            diaryView.style.display = 'none';
        });

        diaryModeBtn.addEventListener('click', () => {
            if (currentDisplayMode === 'diary') return;
            currentDisplayMode = 'diary';
            diaryModeBtn.classList.add('active');
            gridModeBtn.classList.remove('active');
            photoGrid.style.display = 'none';
            diaryView.style.display = 'block';
            renderDiaryView();
        });

        // View Toggle
        viewToggle.addEventListener('click', () => {
            if (currentView === 'calendar') {
                currentView = 'folder';
                viewToggle.textContent = 'カレンダー';
                calendarView.style.display = 'none';
                folderView.style.display = 'block';
                renderFolderView();
            } else {
                currentView = 'calendar';
                viewToggle.textContent = 'フォルダ';
                calendarView.style.display = 'block';
                folderView.style.display = 'none';
            }
        });

        // Calendar Navigation
        prevMonthBtn.addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        });

        nextMonthBtn.addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        });

        // Render Calendar
        function renderCalendar() {
            const year = currentYear;
            const month = currentMonth;

            monthTitle.textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const today = new Date();
            const todayStr = formatDate(today);

            let html = '';

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="calendar-day other-month"><span class="day-number">${day}</span></div>`;
            }

            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedDate;
                const hasPhotos = allLifelogs[dateStr] && Object.keys(allLifelogs[dateStr]).length > 0;

                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasPhotos) classes += ' has-photos';

                html += `<div class="${classes}" data-date="${dateStr}"><span class="day-number">${day}</span></div>`;
            }

            // Next month days
            const totalCells = firstDay + daysInMonth;
            const remainingCells = totalCells <= 35 ? 35 - totalCells : 42 - totalCells;
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="calendar-day other-month"><span class="day-number">${day}</span></div>`;
            }

            calendarDays.innerHTML = html;

            // Add click handlers
            document.querySelectorAll('.calendar-day:not(.other-month)').forEach(dayEl => {
                dayEl.addEventListener('click', () => {
                    const date = dayEl.dataset.date;
                    selectDate(date);
                });
            });
        }

        // Select Date
        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            showPhotosForDate(dateStr);
        }

        // Show Photos for Date
        function showPhotosForDate(dateStr) {
            const photos = allLifelogs[dateStr];

            if (!photos || Object.keys(photos).length === 0) {
                photoSection.style.display = 'block';
                photoDateTitle.textContent = formatDateJapanese(dateStr);
                photoGrid.innerHTML = '<div class="empty-state"><div class="icon">📷</div><p>この日の写真はありません</p></div>';
                diaryView.innerHTML = '<div class="diary-empty">この日の記録はありません</div>';
                return;
            }

            const sortedPhotos = Object.entries(photos)
                .map(([time, data]) => ({ time, ...data }))
                .sort((a, b) => a.timestamp - b.timestamp);

            currentPhotos = sortedPhotos;

            photoSection.style.display = 'block';
            photoDateTitle.textContent = formatDateJapanese(dateStr);

            // Render photo grid
            photoGrid.innerHTML = sortedPhotos.map((photo, index) => `
                <div class="photo-item" data-index="${index}">
                    <img src="${photo.photoUrl}" alt="Lifelog" loading="lazy">
                    <div class="photo-time">${photo.time || ''}</div>
                </div>
            `).join('');

            // Add click handlers for photo grid
            document.querySelectorAll('.photo-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    openPhotoModal(index);
                });
            });

            // Render diary view
            renderDiaryView();

            // Show correct view based on current mode
            if (currentDisplayMode === 'grid') {
                photoGrid.style.display = 'grid';
                diaryView.style.display = 'none';
            } else {
                photoGrid.style.display = 'none';
                diaryView.style.display = 'block';
            }
        }

        // Render Diary View
        function renderDiaryView() {
            if (!selectedDate || currentPhotos.length === 0) {
                diaryView.innerHTML = '<div class="diary-empty">この日の記録はありません</div>';
                return;
            }

            const [year, month, day] = selectedDate.split('-');
            const shortDate = `${parseInt(month)}/${parseInt(day)}`;

            // Group photos by activity (consecutive same activities are merged)
            const activityGroups = [];
            let currentGroup = null;

            currentPhotos.forEach((photo, index) => {
                const activity = (photo.analysis || '').trim();

                // Skip entries without analysis for grouping purposes
                if (!activity) {
                    // If no analysis, treat as separate entry
                    if (currentGroup) {
                        activityGroups.push(currentGroup);
                        currentGroup = null;
                    }
                    activityGroups.push({
                        activity: '',
                        photos: [{ ...photo, originalIndex: index }],
                        startTime: photo.time || '--:--',
                        endTime: photo.time || '--:--'
                    });
                    return;
                }

                // Check if this activity is similar to current group
                if (currentGroup && isSimilarActivity(currentGroup.activity, activity)) {
                    currentGroup.photos.push({ ...photo, originalIndex: index });
                    currentGroup.endTime = photo.time || currentGroup.endTime;
                } else {
                    if (currentGroup) {
                        activityGroups.push(currentGroup);
                    }
                    currentGroup = {
                        activity: activity,
                        photos: [{ ...photo, originalIndex: index }],
                        startTime: photo.time || '--:--',
                        endTime: photo.time || '--:--'
                    };
                }
            });

            if (currentGroup) {
                activityGroups.push(currentGroup);
            }

            let entriesHtml = activityGroups.map(group => {
                const firstPhoto = group.photos[0];
                const photoCount = group.photos.length;
                const hasAnalysis = group.activity.length > 0;

                // Time display
                let timeDisplay;
                if (group.startTime === group.endTime || photoCount === 1) {
                    timeDisplay = group.startTime;
                } else {
                    timeDisplay = `${group.startTime}`;
                }

                const activityText = hasAnalysis ? group.activity : '(記録なし)';

                return `
                    <div class="diary-entry" data-first-index="${firstPhoto.originalIndex}">
                        <div class="entry-time">${timeDisplay}</div>
                        <div class="entry-content">
                            <div class="entry-text ${hasAnalysis ? '' : 'no-analysis'}">
                                ${activityText}
                            </div>
                        </div>
                        <div class="entry-thumbnails">
                            ${group.photos.slice(0, 2).map(p => `<img src="${p.photoUrl}" alt="" loading="lazy">`).join('')}
                            ${photoCount > 2 ? `<span class="more-photos">+${photoCount - 2}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            diaryView.innerHTML = `
                <div class="diary-header">
                    <div class="diary-date">${shortDate}</div>
                    <div class="diary-subtitle">今日やったこと</div>
                </div>
                <div class="diary-content">
                    ${entriesHtml}
                </div>
            `;

            // Add click handlers for diary entries
            document.querySelectorAll('.diary-entry').forEach(entry => {
                entry.addEventListener('click', () => {
                    const index = parseInt(entry.dataset.firstIndex);
                    openPhotoModal(index);
                });
            });
        }

        // Check if two activities are similar
        function isSimilarActivity(activity1, activity2) {
            if (!activity1 || !activity2) return false;

            // Exact match
            if (activity1 === activity2) return true;

            // Extract keywords and check overlap
            const keywords1 = extractKeywords(activity1);
            const keywords2 = extractKeywords(activity2);

            // Check if main keywords match
            const commonKeywords = keywords1.filter(k => keywords2.includes(k));
            return commonKeywords.length > 0;
        }

        // Extract main keywords from activity text
        function extractKeywords(text) {
            // Common location/activity keywords
            const keywords = [];
            const patterns = [
                '公園', '散歩', '買い物', '食事', '仕事', 'PC', 'パソコン',
                '料理', '掃除', '読書', '運動', 'ジム', '電車', '車',
                '会議', 'ミーティング', '外出', '帰宅', '休憩'
            ];

            patterns.forEach(p => {
                if (text.includes(p)) {
                    keywords.push(p);
                }
            });

            return keywords;
        }

        // Render Folder View
        function renderFolderView() {
            const dates = Object.keys(allLifelogs).sort().reverse();

            if (dates.length === 0) {
                folderList.innerHTML = '<div class="empty-state"><div class="icon">📁</div><p>ライフログはまだありません</p></div>';
                return;
            }

            folderList.innerHTML = dates.map(dateStr => {
                const photos = allLifelogs[dateStr];
                const photoList = Object.values(photos);
                const count = photoList.length;
                const previews = photoList.slice(0, 3);

                return `
                    <div class="folder-item" data-date="${dateStr}">
                        <div class="folder-icon">📁</div>
                        <div class="folder-info">
                            <div class="folder-date">${formatDateJapanese(dateStr)}</div>
                            <div class="folder-count">${count}枚</div>
                        </div>
                        <div class="folder-preview">
                            ${previews.map(p => `<img src="${p.photoUrl}" alt="" loading="lazy">`).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            // Add click handlers
            document.querySelectorAll('.folder-item').forEach(item => {
                item.addEventListener('click', () => {
                    const date = item.dataset.date;
                    selectedDate = date;
                    showPhotosForDate(date);

                    // Scroll to photo section
                    photoSection.scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        // Photo Modal
        function openPhotoModal(index) {
            currentPhotoIndex = index;
            updateModalContent();
            photoModal.classList.add('active');
        }

        // 逆ジオコーディングのキャッシュ
        const locationCache = {};

        // 緯度・経度から場所名を取得
        async function getLocationName(lat, lng) {
            const cacheKey = `${lat.toFixed(4)},${lng.toFixed(4)}`;
            if (locationCache[cacheKey]) {
                return locationCache[cacheKey];
            }

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,
                    { headers: { 'Accept-Language': 'ja' } }
                );
                const data = await response.json();

                // 場所名を構築（より具体的な名前を優先）
                let locationName = '';
                if (data.address) {
                    const addr = data.address;
                    // 施設名、建物名、または地区名を優先
                    if (addr.amenity) locationName = addr.amenity;
                    else if (addr.building) locationName = addr.building;
                    else if (addr.leisure) locationName = addr.leisure;
                    else if (addr.shop) locationName = addr.shop;
                    else if (addr.neighbourhood) locationName = addr.neighbourhood;
                    else if (addr.suburb) locationName = addr.suburb;
                    else if (addr.city_district) locationName = addr.city_district;

                    // 市区町村を追加
                    const city = addr.city || addr.town || addr.village || addr.municipality || '';
                    if (city && locationName) {
                        locationName = `${city} ${locationName}`;
                    } else if (city) {
                        locationName = city;
                    }
                }

                if (!locationName && data.display_name) {
                    // フォールバック: display_nameの最初の2要素を使用
                    const parts = data.display_name.split(',').slice(0, 2);
                    locationName = parts.join(',').trim();
                }

                locationCache[cacheKey] = locationName || '不明な場所';
                return locationCache[cacheKey];
            } catch (error) {
                console.error('逆ジオコーディングエラー:', error);
                return null;
            }
        }

        function updateModalContent() {
            const photo = currentPhotos[currentPhotoIndex];
            if (!photo) return;

            modalImg.src = photo.photoUrl;
            modalPhotoInfo.textContent = `${selectedDate} ${photo.time || ''}`;
            modalAnalysis.textContent = photo.analysis || '';

            // 位置情報を表示
            if (photo.location && photo.location.latitude && photo.location.longitude) {
                const lat = photo.location.latitude;
                const lng = photo.location.longitude;
                modalLocation.innerHTML = '読み込み中...';

                getLocationName(lat, lng).then(locationName => {
                    if (locationName) {
                        const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                        modalLocation.innerHTML = `<a href="${mapsUrl}" target="_blank">${locationName}</a>`;
                    } else {
                        modalLocation.innerHTML = '';
                    }
                });
            } else {
                modalLocation.innerHTML = '';
            }

            // Update nav button visibility
            prevPhoto.style.display = currentPhotoIndex > 0 ? 'block' : 'none';
            nextPhoto.style.display = currentPhotoIndex < currentPhotos.length - 1 ? 'block' : 'none';
        }

        closeModal.addEventListener('click', () => {
            photoModal.classList.remove('active');
        });

        prevPhoto.addEventListener('click', () => {
            if (currentPhotoIndex > 0) {
                currentPhotoIndex--;
                updateModalContent();
            }
        });

        nextPhoto.addEventListener('click', () => {
            if (currentPhotoIndex < currentPhotos.length - 1) {
                currentPhotoIndex++;
                updateModalContent();
            }
        });

        // Close modal on background click
        photoModal.addEventListener('click', (e) => {
            if (e.target === photoModal || e.target.classList.contains('modal-body')) {
                photoModal.classList.remove('active');
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!photoModal.classList.contains('active')) return;

            if (e.key === 'Escape') {
                photoModal.classList.remove('active');
            } else if (e.key === 'ArrowLeft') {
                prevPhoto.click();
            } else if (e.key === 'ArrowRight') {
                nextPhoto.click();
            }
        });

        // 合成画像を作成する関数
        async function createCompositeImage(photo, dateStr, timeStr) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';

                img.onload = () => {
                    // キャンバスのサイズ設定
                    const padding = 40;
                    const headerHeight = 80;
                    const footerHeight = 100;
                    const maxPhotoWidth = 800;
                    const maxPhotoHeight = 600;

                    // 写真のアスペクト比を維持しながらサイズを計算
                    let photoWidth = img.width;
                    let photoHeight = img.height;

                    if (photoWidth > maxPhotoWidth) {
                        photoHeight = (maxPhotoWidth / photoWidth) * photoHeight;
                        photoWidth = maxPhotoWidth;
                    }
                    if (photoHeight > maxPhotoHeight) {
                        photoWidth = (maxPhotoHeight / photoHeight) * photoWidth;
                        photoHeight = maxPhotoHeight;
                    }

                    const canvasWidth = Math.max(photoWidth + padding * 2, 400);
                    const canvasHeight = headerHeight + photoHeight + footerHeight + padding;

                    const canvas = document.createElement('canvas');
                    canvas.width = canvasWidth;
                    canvas.height = canvasHeight;
                    const ctx = canvas.getContext('2d');

                    // 背景（黒）
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                    // 日付時間（上部）
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 24px -apple-system, BlinkMacSystemFont, sans-serif';
                    ctx.textAlign = 'center';
                    const dateTimeText = `${dateStr} ${timeStr || ''}`.trim();
                    ctx.fillText(dateTimeText, canvasWidth / 2, headerHeight / 2 + 10);

                    // 写真（中央）
                    const photoX = (canvasWidth - photoWidth) / 2;
                    const photoY = headerHeight;
                    ctx.drawImage(img, photoX, photoY, photoWidth, photoHeight);

                    // 説明文（下部）- 複数行に対応
                    const analysis = photo.analysis || '';
                    if (analysis) {
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
                        ctx.textAlign = 'center';

                        // テキストを折り返す
                        const maxWidth = canvasWidth - padding * 2;
                        const words = analysis.split('');
                        let line = '';
                        const lines = [];

                        for (let i = 0; i < words.length; i++) {
                            const testLine = line + words[i];
                            const metrics = ctx.measureText(testLine);
                            if (metrics.width > maxWidth && line !== '') {
                                lines.push(line);
                                line = words[i];
                            } else {
                                line = testLine;
                            }
                        }
                        lines.push(line);

                        // 最大2行まで表示
                        const displayLines = lines.slice(0, 2);
                        const lineHeight = 28;
                        const textStartY = headerHeight + photoHeight + (footerHeight - displayLines.length * lineHeight) / 2 + 20;

                        displayLines.forEach((line, index) => {
                            ctx.fillText(line, canvasWidth / 2, textStartY + index * lineHeight);
                        });
                    }

                    // Blob に変換
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject(new Error('画像の生成に失敗しました'));
                        }
                    }, 'image/png');
                };

                img.onerror = () => {
                    reject(new Error('画像の読み込みに失敗しました'));
                };

                img.src = photo.photoUrl;
            });
        }

        // Share to X
        shareXBtn.addEventListener('click', async () => {
            const photo = currentPhotos[currentPhotoIndex];
            if (!photo) return;

            try {
                // ボタンを一時的に無効化
                shareXBtn.disabled = true;
                shareXBtn.style.opacity = '0.5';

                // 合成画像を作成
                const blob = await createCompositeImage(photo, selectedDate, photo.time);
                const file = new File([blob], `lifelog-${selectedDate}-${photo.time || 'photo'}.png`, { type: 'image/png' });

                // Web Share API が使えるか確認
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'ライフログ',
                        text: photo.analysis || ''
                    });
                } else {
                    // Web Share API が使えない場合はダウンロード
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `lifelog-${selectedDate}-${photo.time || 'photo'}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    // ダウンロード後、Xを開くか確認
                    alert('画像をダウンロードしました。この画像をXに投稿できます。');
                }
            } catch (error) {
                console.error('共有エラー:', error);
                if (error.name !== 'AbortError') {
                    alert('共有に失敗しました: ' + error.message);
                }
            } finally {
                shareXBtn.disabled = false;
                shareXBtn.style.opacity = '1';
            }
        });

        // Helper Functions
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateJapanese(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${year}年${parseInt(month)}月${parseInt(day)}日`;
        }

        // Load Lifelogs from Firebase
        function loadLifelogs() {
            const lifelogsRef = ref(db, 'lifelogs');

            onValue(lifelogsRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allLifelogs = data;
                } else {
                    allLifelogs = {};
                }

                renderCalendar();
                if (currentView === 'folder') {
                    renderFolderView();
                }
                if (selectedDate) {
                    showPhotosForDate(selectedDate);
                }
            });
        }

        // Initialize
        loadLifelogs();
        renderCalendar();
    </script>
</body>
</html>
