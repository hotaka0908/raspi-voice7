<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>プロファイル - raspi-voice</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(74, 222, 128, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            flex: 1;
            color: white;
        }

        .header .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 5px;
        }

        .header .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .container {
            padding: 80px 15px 30px;
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
        }

        /* カードコンテナ - 3Dフリップ用 */
        .card-container {
            position: relative;
            width: 100%;
            max-width: 330px;
            cursor: pointer;
            perspective: 1000px;
        }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 63 / 88;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(
                135deg,
                #d4a017 0%,
                #f4d03f 10%,
                #d4a017 20%,
                #f4d03f 30%,
                #d4a017 40%,
                #f4d03f 50%,
                #d4a017 60%,
                #f4d03f 70%,
                #d4a017 80%,
                #f4d03f 90%,
                #d4a017 100%
            );
            border: 4px solid #8b6914;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .card-face.front {
            z-index: 2;
        }

        .card-face.back {
            z-index: 1;
            transform: rotateY(180deg);
        }

        /* 虹色ホログラフィック背景 */
        .card-face::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(
                    45deg,
                    rgba(255, 0, 128, 0.15) 0%,
                    rgba(255, 128, 0, 0.15) 14%,
                    rgba(255, 255, 0, 0.15) 28%,
                    rgba(0, 255, 128, 0.15) 42%,
                    rgba(0, 128, 255, 0.15) 56%,
                    rgba(128, 0, 255, 0.15) 70%,
                    rgba(255, 0, 128, 0.15) 84%,
                    rgba(255, 128, 0, 0.15) 100%
                );
            background-size: 400% 400%;
            animation: rainbowShift 4s ease infinite;
            pointer-events: none;
            z-index: 1;
        }

        /* キラキラ光沢効果 */
        .card-face::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8) 0%, transparent 8%),
                radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.6) 0%, transparent 6%),
                radial-gradient(circle at 40% 60%, rgba(255, 255, 255, 0.7) 0%, transparent 5%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.5) 0%, transparent 7%),
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.6) 0%, transparent 4%);
            animation: sparkle 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.6; transform: rotate(0deg); }
            50% { opacity: 1; transform: rotate(180deg); }
        }

        /* カード内枠 */
        .card-inner {
            position: relative;
            margin: 6px;
            height: calc(100% - 12px);
            border: 2px solid #a67c00;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 10;
            padding-bottom: 2px;
        }

        /* カード内コンテンツ */
        .card-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* カード上部ヘッダー */
        .card-header {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            gap: 6px;
            background: linear-gradient(180deg, rgba(255, 200, 100, 0.3) 0%, transparent 100%);
        }

        .evolution-badge {
            background: linear-gradient(180deg, #ff4444, #cc0000);
            color: white;
            font-size: 0.55rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #990000;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
        }

        .card-name {
            flex: 1;
            font-size: 1.2rem;
            font-weight: 900;
            color: #1a1a1a;
            text-shadow:
                1px 1px 0 rgba(255,255,255,0.8),
                -1px -1px 0 rgba(0,0,0,0.1);
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .ex-badge {
            font-size: 0.8rem;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(180deg, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-hp {
            font-size: 1.4rem;
            font-weight: 900;
            color: #cc0000;
            text-shadow:
                1px 1px 0 rgba(255,255,255,0.8),
                2px 2px 2px rgba(0,0,0,0.2);
            display: flex;
            align-items: baseline;
        }

        .card-hp .hp-label {
            font-size: 0.5rem;
            font-weight: 700;
            margin-right: 2px;
        }

        .type-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(145deg, #d4a017, #8b6914);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 2px solid #5c4a0f;
            box-shadow:
                inset 0 2px 4px rgba(255,255,255,0.3),
                inset 0 -2px 4px rgba(0,0,0,0.2),
                0 2px 4px rgba(0,0,0,0.3);
        }

        .evolution-from {
            font-size: 0.5rem;
            color: #333;
            padding: 0 8px 4px;
            opacity: 0.8;
        }

        /* イメージエリア */
        .card-image-area {
            margin: 0 6px;
            flex: 1;
            min-height: 100px;
            background:
                radial-gradient(ellipse at center, #a080ff 0%, #6040c0 30%, #4020a0 60%, #200060 100%);
            border-radius: 6px;
            border: 3px solid #5c4a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow:
                inset 0 0 30px rgba(255, 255, 255, 0.2),
                inset 0 0 60px rgba(128, 0, 255, 0.3);
        }

        .card-image-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 100, 150, 0.3) 0%,
                rgba(255, 200, 100, 0.3) 25%,
                rgba(100, 255, 150, 0.3) 50%,
                rgba(100, 150, 255, 0.3) 75%,
                rgba(200, 100, 255, 0.3) 100%
            );
            animation: imageGlow 5s ease infinite;
            pointer-events: none;
        }

        @keyframes imageGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .card-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 1;
        }

        .card-image-placeholder {
            font-size: 3.5rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* 特性セクション */
        .ability-section {
            margin: 6px;
            padding: 6px 8px;
            background: linear-gradient(180deg, #fff8e0 0%, #f0e8c8 100%);
            border-radius: 4px;
            border: 1px solid #a67c00;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.5);
        }

        .ability-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }

        .ability-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(145deg, #888, #555);
            border-radius: 50%;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        .ability-label-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ability-label {
            background: linear-gradient(180deg, #e53935, #b71c1c);
            color: white;
            font-size: 0.5rem;
            font-weight: 800;
            padding: 1px 6px;
            border-radius: 2px;
            letter-spacing: 1px;
            border: 1px solid #7f0000;
        }

        .ability-ruby {
            font-size: 0.4rem;
            color: #666;
        }

        .ability-name {
            font-size: 0.85rem;
            font-weight: 900;
            color: #1a1a1a;
        }

        .ability-desc {
            font-size: 0.55rem;
            color: #333;
            line-height: 1.3;
            padding-left: 26px;
        }

        /* 技セクション */
        .move-section {
            margin: 0 6px 4px;
            padding: 6px 8px;
            background: linear-gradient(180deg, #fff8e0 0%, #f0e8c8 100%);
            border-radius: 4px;
            border: 1px solid #a67c00;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.5);
        }

        .move-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }

        .energy-icons {
            display: flex;
            gap: 2px;
        }

        .energy-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            font-weight: bold;
            color: white;
            border: 1px solid rgba(0,0,0,0.4);
            box-shadow:
                inset 0 2px 3px rgba(255,255,255,0.3),
                inset 0 -2px 3px rgba(0,0,0,0.2);
        }

        .energy-icon.fighting {
            background: linear-gradient(145deg, #c68c53, #8b5a2b);
        }

        .energy-icon.colorless {
            background: linear-gradient(145deg, #e0e0e0, #a0a0a0);
        }

        .move-name {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 900;
            color: #1a1a1a;
        }

        .move-damage {
            font-size: 1.1rem;
            font-weight: 900;
            color: #1a1a1a;
        }

        .move-desc {
            font-size: 0.5rem;
            color: #333;
            line-height: 1.3;
            padding-left: 38px;
        }

        /* フッター情報 */
        .card-footer {
            margin: 0 6px 4px;
            padding: 4px 8px;
            background: linear-gradient(180deg, #fff8e0 0%, #f0e8c8 100%);
            border-radius: 4px;
            border: 1px solid #a67c00;
            display: flex;
            justify-content: space-between;
            font-size: 0.5rem;
            color: #333;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .footer-label {
            color: #666;
            font-weight: 600;
        }

        .weakness-icon {
            width: 12px;
            height: 12px;
            background: linear-gradient(145deg, #c68c53, #8b5a2b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.4rem;
            border: 1px solid #5c3a1a;
        }

        .weakness-value {
            font-weight: 700;
            color: #cc0000;
        }

        .retreat {
            display: flex;
            gap: 1px;
        }

        .retreat-icon {
            width: 10px;
            height: 10px;
            background: linear-gradient(145deg, #e0e0e0, #a0a0a0);
            border-radius: 50%;
            border: 1px solid #666;
        }

        /* exルールセクション */
        .ex-rule-section {
            margin: 0 6px 4px;
            padding: 4px 8px;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 4px;
            border: 1px solid #444;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .ex-rule-badge {
            background: linear-gradient(180deg, #ffcc00, #ff9900);
            color: #1a1a1a;
            font-size: 0.5rem;
            font-weight: 900;
            font-style: italic;
            padding: 1px 4px;
            border-radius: 2px;
            white-space: nowrap;
        }

        .ex-rule-text {
            font-size: 0.45rem;
            color: #ccc;
            line-height: 1.3;
        }

        /* イラストレーター・コピーライト */
        .card-credits {
            padding: 2px 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.4rem;
            color: #555;
        }

        .rarity {
            font-size: 0.5rem;
        }

        /* AIミニカード */
        .ai-mini-card-container {
            width: 100%;
            max-width: 165px;
            margin-top: 15px;
            cursor: pointer;
            perspective: 500px;
        }

        .ai-mini-card {
            position: relative;
            width: 100%;
            aspect-ratio: 63 / 88;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-mini-card:hover {
            transform: rotateY(10deg) rotateX(-5deg);
        }

        .ai-mini-card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(
                135deg,
                #c44569 0%,
                #ff6b9d 10%,
                #c44569 20%,
                #ff6b9d 30%,
                #c44569 40%,
                #ff6b9d 50%,
                #c44569 60%,
                #ff6b9d 70%,
                #c44569 80%,
                #ff6b9d 90%,
                #c44569 100%
            );
            border: 3px solid #8b2a4a;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .ai-mini-card-face::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.2) 0%,
                    rgba(255, 200, 255, 0.2) 25%,
                    rgba(200, 255, 255, 0.2) 50%,
                    rgba(255, 255, 200, 0.2) 75%,
                    rgba(255, 255, 255, 0.2) 100%
                );
            background-size: 400% 400%;
            animation: rainbowShift 4s ease infinite;
            pointer-events: none;
            z-index: 1;
        }

        .ai-mini-card-face::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6) 0%, transparent 8%),
                radial-gradient(circle at 70% 60%, rgba(255, 255, 255, 0.5) 0%, transparent 6%);
            animation: sparkle 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }

        .ai-mini-card-inner {
            position: relative;
            margin: 4px;
            height: calc(100% - 8px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
            padding: 4px;
        }

        .ai-mini-header {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 4px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            border-radius: 3px;
        }

        .ai-mini-badge {
            background: linear-gradient(180deg, #6b5ce7, #4834d4);
            color: white;
            font-size: 0.35rem;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .ai-mini-name {
            flex: 1;
            font-size: 0.6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .ai-mini-hp {
            font-size: 0.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .ai-mini-image {
            flex: 1;
            margin: 3px 0;
            background: radial-gradient(ellipse at center, #a080ff 0%, #6040c0 50%, #4020a0 100%);
            border-radius: 4px;
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* AIキャラクター犬 */
        .ai-face {
            position: relative;
            width: 50px;
            height: 45px;
            background: linear-gradient(145deg, #f5deb3, #deb887);
            border-radius: 50% 50% 45% 45%;
            box-shadow:
                0 4px 8px rgba(0,0,0,0.3),
                inset 0 -3px 6px rgba(0,0,0,0.1),
                inset 0 3px 6px rgba(255,255,255,0.5);
        }

        /* 耳 */
        .ai-ears {
            position: absolute;
            top: -8px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
        }

        .ai-ear {
            width: 14px;
            height: 20px;
            background: linear-gradient(145deg, #d2a679, #b8956e);
            border-radius: 50% 50% 40% 40%;
            transform: rotate(-15deg);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .ai-ear:last-child {
            transform: rotate(15deg);
        }

        .ai-eyes {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
        }

        .ai-eye {
            width: 10px;
            height: 10px;
            background: linear-gradient(145deg, #2a1810, #4a2820);
            border-radius: 50%;
            position: relative;
            animation: blink 3s ease-in-out infinite;
        }

        .ai-eye::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
        }

        @keyframes blink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        /* 鼻 */
        .ai-nose {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 8px;
            background: linear-gradient(145deg, #3a2a2a, #2a1a1a);
            border-radius: 50% 50% 45% 45%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .ai-mouth {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border: 2px solid #8b6914;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        /* 舌 */
        .ai-tongue {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 6px;
            background: linear-gradient(180deg, #ff8888, #ff6666);
            border-radius: 0 0 50% 50%;
            animation: pant 1.5s ease-in-out infinite;
        }

        @keyframes pant {
            0%, 100% { height: 6px; }
            50% { height: 10px; }
        }

        .ai-cheeks {
            display: none;
        }

        .ai-cheek {
            display: none;
        }

        .ai-mini-info {
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            padding: 4px;
        }

        .ai-mini-trait {
            font-size: 0.4rem;
            color: #fff;
            text-align: center;
            font-weight: 600;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
        }

        .ai-mini-desc {
            font-size: 0.35rem;
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin-top: 2px;
        }

        /* AI設定モーダル */
        .ai-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .ai-modal.show {
            display: flex;
            animation: modalFadeIn 0.3s ease;
        }

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import firebaseConfig from './firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const content = document.getElementById('content');
        const refreshBtn = document.getElementById('refreshBtn');
        const editModal = document.getElementById('editModal');

        let isDetailView = false;

        const valueLabels = {
            efficiency: '効率マスター',
            routine: 'ルーティンの達人',
            solitude: '静寂の守護者',
            socialActivity: '社交の星',
            spontaneity: '即興の天才'
        };

        function getUserInfo() {
            const stored = localStorage.getItem('userProfile');
            if (stored) {
                return JSON.parse(stored);
            }
            return { name: '', bio: '', avatarUrl: '' };
        }

        function saveUserInfo(info) {
            localStorage.setItem('userProfile', JSON.stringify(info));
        }

        function showEditModal() {
            const userInfo = getUserInfo();
            document.getElementById('editNameInput').value = userInfo.name || '';
            document.getElementById('editBioInput').value = userInfo.bio || '';
            const preview = document.getElementById('editAvatarPreview');
            preview.innerHTML = userInfo.avatarUrl
                ? `<img src="${userInfo.avatarUrl}" alt="">`
                : '👤';
            editModal.classList.add('show');
        }

        function hideEditModal() {
            editModal.classList.remove('show');
        }

        document.getElementById('editAvatarPreview').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const userInfo = getUserInfo();
                        userInfo.avatarUrl = event.target.result;
                        saveUserInfo(userInfo);
                        document.getElementById('editAvatarPreview').innerHTML =
                            `<img src="${event.target.result}" alt="">`;
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });

        document.getElementById('editSaveBtn').addEventListener('click', () => {
            const userInfo = getUserInfo();
            userInfo.name = document.getElementById('editNameInput').value;
            userInfo.bio = document.getElementById('editBioInput').value;
            saveUserInfo(userInfo);
            hideEditModal();
            isDetailView = false;
            renderProfile(window.currentProfile || sampleProfile);
        });

        document.getElementById('editCancelBtn').addEventListener('click', hideEditModal);

        // ========== AI設定機能 ==========
        const aiModal = document.getElementById('aiModal');
        let tempAiSettings = {};

        const previewTexts = {
            friendly: {
                polite: '「こんにちは！何かお手伝いできることはありますか？」',
                casual: '「やっほー！何か手伝おうか？」',

                kawaii: '「こんにちはぁ～！なにかお手伝いできるかな？」'
            },
            calm: {
                polite: '「こんにちは。何かございましたらお申し付けください。」',
                casual: '「やあ。何かあったら言ってね。」',
                butler: '「お呼びでございますか。何なりとお申し付けください。」',
                kawaii: '「こんにちは...。何かあったら言ってね...。」'

                polite: '「こんにちは！今日も元気に頑張りましょう！」',

                butler: '「ご主人様！本日も全力でお仕えいたします！」',

                butler: '「...お呼びですか、ご主人様。」',

        function getAiSettings() {
            const stored = localStorage.getItem('aiSettings');
            if (stored) {
                return JSON.parse(stored);
            }
            return { personality: 'friendly', speechStyle: 'polite', voiceTone: 'normal' };
        }

        function saveAiSettings(settings) {
            localStorage.setItem('aiSettings', JSON.stringify(settings));
        }

        function updatePreviewText() {
            const personality = tempAiSettings.personality || 'friendly';
            const speechStyle = tempAiSettings.speechStyle || 'polite';
            const previewText = previewTexts[personality]?.[speechStyle] || previewTexts.friendly.polite;
            document.getElementById('aiPreviewText').textContent = previewText;
        }

        function showAiModal() {
            tempAiSettings = { ...getAiSettings() };

            // 現在の選択を反映
            document.querySelectorAll('#personalityOptions .ai-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.value === tempAiSettings.personality);
            });
            document.querySelectorAll('#speechStyleOptions .ai-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.value === tempAiSettings.speechStyle);
            });
            document.querySelectorAll('#voiceToneOptions .ai-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.value === tempAiSettings.voiceTone);
            });

            updatePreviewText();
            aiModal.classList.add('show');
        }

        function hideAiModal() {
            aiModal.classList.remove('show');
        }

        // 性格オプションのクリックイベント
        document.querySelectorAll('#personalityOptions .ai-option').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('#personalityOptions .ai-option').forEach(o => o.classList.remove('selected'));
                el.classList.add('selected');
                tempAiSettings.personality = el.dataset.value;
                updatePreviewText();
            });
        });

        // 話し方オプションのクリックイベント
        document.querySelectorAll('#speechStyleOptions .ai-option').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('#speechStyleOptions .ai-option').forEach(o => o.classList.remove('selected'));
                el.classList.add('selected');
                tempAiSettings.speechStyle = el.dataset.value;
                updatePreviewText();
            });
        });

        // 声トーンオプションのクリックイベント
        document.querySelectorAll('#voiceToneOptions .ai-option').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('#voiceToneOptions .ai-option').forEach(o => o.classList.remove('selected'));
                el.classList.add('selected');
                tempAiSettings.voiceTone = el.dataset.value;
            });
        });

        document.getElementById('aiModalClose').addEventListener('click', hideAiModal);
        document.getElementById('aiCancelBtn').addEventListener('click', hideAiModal);
        document.getElementById('aiSaveBtn').addEventListener('click', () => {
            saveAiSettings(tempAiSettings);
            hideAiModal();
        });

        function toggleView() {
            isDetailView = !isDetailView;
            const card = document.querySelector('.card');
            if (card) {
                card.classList.toggle('flipped');
            }
        }

        function setupCardToggle() {
            const card = document.querySelector('.card');
            if (card) {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.edit-trigger')) {
                        e.stopPropagation();
                        showEditModal();
                        return;
                    }
                    toggleView();
                });
            }

            const aiMiniCard = document.querySelector('.ai-mini-card-container');
            if (aiMiniCard) {
                aiMiniCard.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showAiModal();
                });
            }
        }

        function renderProfile(profile) {

            const lifestyle = profile.lifestyle || {};

            const values = profile.values || {};
            const preferences = profile.preferences || {};
            const insights = profile.insights || [];

            const topTrait = (personality.traits || ['落ち着きのオーラ'])[0];

                                    <div class="ability-desc">

                                        <span class="move-name">${valueLabels[topValue?.[0]] || '効率マスター'}</span>
                                        <span class="move-damage">${damageValue}</span>
                                    </div>
                                    <div class="move-desc">
                                        この能力を発動すると、相手は行動を制限される。
                                    </div>
                                </div>

                                <div class="card-footer">
                                    <div class="footer-item">

                                    </div>
                                    <div class="footer-item">
                                        <span class="footer-label">抵抗力</span>
                                    </div>
                                    <div class="footer-item">
                                        <span class="footer-label">にげる</span>
                                        <div class="retreat">

                                            <span class="retreat-icon"></span>
                                        </div>

                                </div>

                                <div class="ex-rule-section">

                                    </span>
                                </div>

                                    <div class="card-credits">
                                        <div class="illustrator">
                                            <span>Illus. AI Works</span>
                                        </div>
                                        <div class="rarity">◆◆◆</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 裏面 -->
                        <div class="card-face back">
                            <div class="card-inner">
                                <div class="detail-content">
                                    <div class="detail-header">
                                        <div class="detail-avatar">

                                                <div class="sleep-label">起床</div>
                                                <div class="sleep-value">${sleep.wakeTime || '06:30'}</div>
                                            </div>
                                            <span class="sleep-type-badge">${sleep.type || '朝型'}</span>
                                            <div class="sleep-item">
                                                <div class="sleep-icon">🌙</div>
                                                <div class="sleep-label">就寝</div>
                                                <div class="sleep-value">${sleep.sleepTime || '23:00'}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="detail-section">
                                        <div class="detail-section-title">生活パターン</div>
                                        <div class="lifestyle-grid">
                                            <div class="lifestyle-item">
                                                <div class="lifestyle-label">午前</div>

                                            <div class="lifestyle-item">

                                    </div>

                                    ${(preferences.likes?.length || preferences.dislikes?.length) ? `

                                        <div class="ai-nose"></div>

                                        <div class="ai-tongue"></div>
                                    </div>
                                </div>
                                <div class="ai-mini-info">
                                    <div class="ai-mini-trait">${aiPersonalityLabels[aiSettings.personality] || 'フレンドリー'} × ${aiSpeechLabels[aiSettings.speechStyle] || '敬語'}</div>
                                    <div class="ai-mini-desc">タップして設定</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            window.currentProfile = profile;
            isDetailView = false;
            setupCardToggle();
        }

        const sampleProfile = {
            generatedAt: new Date().toISOString(),
            dataPoints: 1250,
            personality: {
                summary: "効率重視の朝型クリエイター",
                traits: ["落ち着きのオーラ", "ルーティン好き", "一人時間を大切にする"]

            sleepSchedule: {

            },
            lifestyle: {
                morning: "カフェで集中作業",
                afternoon: "外出・打ち合わせ",
                evening: "自宅でリラックス",
                weekend: "自宅中心で過ごす"
            },
            activityKeywords: {

        function renderEmpty() {
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🃏</div>
                    <div class="empty-title">プロファイルカードがありません</div>
                    <div class="empty-desc">
                        ライフログを記録すると、AIがあなたの<br>
                        プロファイルカードを作成します。
                    </div>
                    <button class="generate-btn" id="previewBtn">
                        サンプルを見る
                    </button>
                </div>
            `;

            document.getElementById('previewBtn')?.addEventListener('click', () => {
                renderProfile(sampleProfile);
            });
        }

        async function loadProfile() {
            content.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>プロファイルを読み込み中...</p>
                </div>
            `;

            try {
                const profileRef = ref(db, 'user_profile');
                const snapshot = await get(profileRef);
                const profile = snapshot.val();

                if (profile && profile.personality) {
                    renderProfile(profile);
                } else {
                    renderEmpty();
                }
            } catch (error) {
                console.error('プロファイル読み込みエラー:', error);
                renderProfile(sampleProfile);
            }
        }

        refreshBtn.addEventListener('click', loadProfile);

        renderProfile(sampleProfile);
    </script>
</body>
</html>
